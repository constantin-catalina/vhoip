defaults:
  - base

dataset:
  name: "mphoi72"
  root: "data/mphoi72/"
  num_classes: 13               
  num_subjects: 12
  cross_validation: "two_subject_out"   

  clip_subject: "person"
  clip_template: 
    - "A photo of a {subject} {verb}"
    - "A {subject} is {verb}"
    - "The {subject} performs {verb}"
    - "An image showing a {subject} {verb}"
    - "A {subject} engaged in {verb}"


model:
  num_classes: 13

training:
  epochs: 50
  batch_size: 1
  stage1_epochs: 5
  stage2_epochs: 50
  lambda1_start: 0.1  
  lambda1_final: 1.0     

  scheduler: "plateau"        
  scheduler_patience: 5       
  scheduler_factor: 0.5       

logging:
  wandb_enabled: true
  wandb_project: "vhoip"
  wandb_run_name: "{dataset}_c6_fold{fold}"
  local_logging_enabled: false    # no TensorBoard files
  local_checkpoints_enabled: true