defaults:
  - base

dataset:
  name: "mphoi72"
  root: "data/mphoi72/"
  num_classes: 13               
  num_subjects: 12
  cross_validation: "two_subject_out"   

  clip_subject: "person"
  clip_template:
  - "A photo of a {subject} {verb}"
  - "A {subject} {verb} with their hands and arms"
  - "Two people where one is {verb}"
  - "A scene where a person is {verb} an object"

model:
  num_classes: 13

training:
  epochs: 50
  batch_size: 1
  stage1_epochs: 3
  stage2_epochs: 57
  lambda1_start: 0.1
  lambda1_final: 1.0

  # Tuned loss weights: strengthen text prior (lambda3), weaken MI (lambda2)
  lambda2: 0.3
  lambda3: 0.7

  scheduler: "cosine"

  # Segmentation loss (L_Seg) settings
  seg_sigma: 2.0          # Gaussian kernel width for boundary smoothing
  seg_pos_weight: 5.0     # BCE pos_weight for boundary class imbalance
