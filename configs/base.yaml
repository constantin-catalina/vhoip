
model:
  clip_model: "ViT-B/16"         # encoder CLIP folosit
  clip_dim: 512                  # dimensiune feature CLIP
  hidden_dim: 256                # dimensiune ascunsa BiRNN
  num_layers: 2                  # straturi BiRNN
  dropout: 0.3
  use_learnable_prompts: true    # C6b: CoOp-style learnable context vectors
  prompt_n_ctx: 16               # number of learnable context tokens
  prompt_ctx_init: "a photo of a person"  # initialization string for context vectors

training:
  epochs: 50
  batch_size: 4                  
  learning_rate: 1.0e-3
  warmup_epochs: 5               # epoci pentru warmup

  # Coeficienti loss
  lambda1: 1.0                   # L_Seg
  lambda2: 0.5                   # L_MI
  lambda3: 0.5                   # L_Cos
  lambda_ant: 1.0                # L_Anticipation

  # EMA
  rho: 0.9                       

  # Mixed precision
  use_amp: false

  # Gradient clipping
  grad_clip: 0.5

  # Segmentation loss (L_Seg) settings
  seg_sigma: 2.0          # Gaussian kernel width for boundary smoothing
  seg_pos_weight: 5.0     # BCE pos_weight for boundary class imbalance

data:
  roi_dim: 2048                  # dimensiune ROI pooling Faster R-CNN
  num_workers: 2
  pin_memory: true

evaluation:
  iou_thresholds: [0.10, 0.25, 0.50]   # pentru F1@10, F1@25, F1@50

logging:
  log_dir: "logs/"
  checkpoint_dir: "checkpoints/"
  save_every: 5
  log_every: 10
  local_logging_enabled: false    # no TensorBoard files by default
  local_checkpoints_enabled: true
  wandb_enabled: true
  wandb_project: "vhoip"
  wandb_entity: null
  wandb_run_name: "{dataset}_{experiment_name}_fold{fold}_seed{seed}"